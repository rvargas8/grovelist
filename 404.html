<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Daily Scripture</title>
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .error-page {
      min-height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }
    .error-code {
      font-family: 'Lora', Georgia, serif;
      font-size: 5rem;
      color: #c9a84c;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-heading {
      font-size: 1.375rem;
      margin-bottom: 0.75rem;
    }
    .error-sub {
      color: #6b6259;
      margin-bottom: 2rem;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 0 1.5rem;
      background: #2c4a7c;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .back-link:hover { background: #1e3560; color: #fff; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="header-brand">
        <span class="header-cross" aria-hidden="true">✝</span>
        <h1 class="site-title">Daily Scripture</h1>
      </div>
      <p class="site-tagline">Your daily companion for God's Word</p>
    </div>
  </header>

  <main>
    <div class="error-page">
      <div>
        <p class="error-code">404</p>
        <h2 class="error-heading">Page not found</h2>
        <p class="error-sub">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="back-link">Back to Daily Scripture</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="footer-verse">"Your word is a lamp to my feet and a light to my path." — Psalm 119:105</p>
    </div>
  </footer>
</body>
</html>
